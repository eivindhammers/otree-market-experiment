# Add this to your nginx sites-available
# Replace experiment.yourdomain.com with your actual domain

server {
    listen 80;
    server_name experiment.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name experiment.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/experiment.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/experiment.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
