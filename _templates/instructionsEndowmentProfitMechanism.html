<h3>Praktisk</h3>
<ul>
    <li>Du starter hver runde med kontanter og eiendeler.</li>
    <li>Pris må være positiv, og volum må være heltall.</li>
    <li>Du kan ikke handle mot din egen ordre.</li>
</ul>

<h3>Utbetaling</h3>
<p>
Rundeutbetaling beregnes fra endring i formue i runden.
Du ser detaljer etter hver runde og en oppsummering til slutt.
</p>
